<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pretext Testimonial Carousel Demo</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400..900;1,400..900&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: system-ui, sans-serif;
      background: #e8e4df;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 2rem;
    }

    h1 {
      font-family: system-ui, sans-serif;
      font-size: 1.1rem;
      font-weight: 500;
      color: #666;
      margin-bottom: 1.5rem;
      text-align: center;
    }

    .demo-container {
      display: flex;
      gap: 3rem;
      align-items: flex-start;
      flex-wrap: wrap;
      justify-content: center;
    }

    .demo-card-wrapper {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0.75rem;
    }

    .demo-label {
      font-size: 0.85rem;
      color: #888;
      font-weight: 500;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }

    .card {
      width: 500px;
      height: 500px;
      background: #f5f2ed;
      border-radius: 20px;
      padding: 40px;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      position: relative;
      overflow: hidden;
    }

    .card-content {
      flex: 1;
      display: flex;
      flex-direction: column;
    }

    .quote {
      font-family: "Playfair Display", Georgia, serif;
      color: #1a1a1a;
      line-height: 1.15;
      flex: 1;
    }

    .attribution {
      font-family: system-ui, sans-serif;
      font-size: 14px;
      font-weight: 600;
      color: #1a1a1a;
      margin-top: 16px;
    }

    .dots {
      display: flex;
      justify-content: center;
      gap: 8px;
      padding-top: 20px;
    }

    .dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      background: #ccc;
      cursor: pointer;
      border: none;
      padding: 0;
      transition: background 0.2s;
    }

    .dot.active {
      background: #1a1a1a;
    }

    .info {
      margin-top: 2rem;
      max-width: 700px;
      text-align: center;
      color: #666;
      font-size: 0.9rem;
      line-height: 1.6;
    }

    .size-badge {
      position: absolute;
      top: 12px;
      right: 12px;
      background: rgba(0,0,0,0.06);
      color: #888;
      font-family: monospace;
      font-size: 11px;
      padding: 4px 8px;
      border-radius: 6px;
    }
  </style>
</head>
<body>
  <h1>Adaptive Testimonial Sizing with Pretext</h1>

  <div class="demo-container">
    <div class="demo-card-wrapper">
      <span class="demo-label">Fixed size (naive)</span>
      <div class="card" id="card-fixed">
        <div class="card-content">
          <div class="quote" id="quote-fixed"></div>
          <div class="attribution" id="attr-fixed"></div>
        </div>
        <div class="dots" id="dots-fixed"></div>
      </div>
    </div>

    <div class="demo-card-wrapper">
      <span class="demo-label">Pretext-optimised</span>
      <div class="card" id="card-pretext">
        <div class="card-content">
          <div class="quote" id="quote-pretext"></div>
          <div class="attribution" id="attr-pretext"></div>
        </div>
        <div class="dots" id="dots-pretext"></div>
        <span class="size-badge" id="size-badge"></span>
      </div>
    </div>
  </div>

  <p class="info" id="info"></p>

  <script type="module">
    import { prepare, layout } from 'https://esm.sh/@chenglou/pretext@0.0.3'

    const testimonials = [
      {
        text: "\u201CAs someone who struggles with chronic illness and very complex medical issues, Sollis has been a lifesaver.\u201D",
        author: "Kelsey, Sollis Member"
      },
      {
        text: "\u201CExceptional care.\u201D",
        author: "Michael, Sollis Member"
      },
      {
        text: "\u201CI cannot say enough good things about Sollis Health. From the moment I walked in, the staff was incredibly welcoming and attentive. The doctors took the time to listen to my concerns, explain everything in detail, and develop a treatment plan that actually worked. The facility is beautiful and clean, and I never had to wait more than a few minutes. It\u2019s clear they genuinely care about their patients.\u201D",
        author: "Sarah, Sollis Member"
      },
      {
        text: "\u201CThe team at Sollis responded within minutes when I needed urgent care for my daughter. That kind of responsiveness is priceless.\u201D",
        author: "David, Sollis Member"
      },
      {
        text: "\u201CWorld class.\u201D",
        author: "Amy, Sollis Member"
      }
    ]

    const CARD_WIDTH = 500
    const CARD_HEIGHT = 500
    const CARD_PADDING = 40
    const ATTR_HEIGHT = 30  // attribution line height
    const DOTS_HEIGHT = 30  // dots area
    const FIXED_FONT_SIZE = 42

    // Available width/height for the quote text
    const textWidth = CARD_WIDTH - (CARD_PADDING * 2)
    const maxTextHeight = CARD_HEIGHT - (CARD_PADDING * 2) - ATTR_HEIGHT - DOTS_HEIGHT

    let currentIndex = 0

    // Find the largest font size where text fits in the available height
    function findOptimalSize(text, minSize, maxSize) {
      let best = minSize

      for (let size = maxSize; size >= minSize; size -= 1) {
        const fontStr = `${size}px "Playfair Display"`
        const lineHeight = Math.round(size * 1.15)
        const prepared = prepare(text, fontStr)
        const result = layout(prepared, textWidth, lineHeight)

        if (result.height <= maxTextHeight) {
          best = size
          break
        }
      }

      return best
    }

    function renderFixed(index) {
      const t = testimonials[index]
      const el = document.getElementById('quote-fixed')
      el.textContent = t.text
      el.style.fontSize = `${FIXED_FONT_SIZE}px`
      document.getElementById('attr-fixed').textContent = t.author
    }

    function renderPretext(index) {
      const t = testimonials[index]
      const optimalSize = findOptimalSize(t.text, 20, 100)
      const el = document.getElementById('quote-pretext')
      el.textContent = t.text
      el.style.fontSize = `${optimalSize}px`
      document.getElementById('attr-pretext').textContent = t.author
      document.getElementById('size-badge').textContent = `${optimalSize}px`

      document.getElementById('info').textContent =
        `"${t.author}" — pretext computed optimal size: ${optimalSize}px ` +
        `(fixed would be ${FIXED_FONT_SIZE}px). ` +
        `Layout calculation is pure arithmetic — no DOM reflows needed.`
    }

    function renderDots(containerId, index) {
      const container = document.getElementById(containerId)
      container.innerHTML = ''
      testimonials.forEach((_, i) => {
        const dot = document.createElement('button')
        dot.className = `dot${i === index ? ' active' : ''}`
        dot.addEventListener('click', () => goTo(i))
        container.appendChild(dot)
      })
    }

    function goTo(index) {
      currentIndex = index
      renderFixed(index)
      renderPretext(index)
      renderDots('dots-fixed', index)
      renderDots('dots-pretext', index)
    }

    // Wait for font to load before measuring
    await document.fonts.load('42px "Playfair Display"')
    goTo(0)
  </script>
</body>
</html>
